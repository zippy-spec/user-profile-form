<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>User Information Form</title>

<style>

body{
font-family: Arial, sans-serif;
background:#eef2f7;
padding:40px;
}

.form-container{
width:400px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#2c3e50;
}

label{
font-weight:bold;
color:#333;
}

input, textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

.gender{
margin-bottom:15px;
}

.buttons{
text-align:center;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.submit{
background:#2ecc71;
color:white;
}

.clear{
background:#e67e22;
color:white;
}

.cancel{
background:#e74c3c;
color:white;
}

</style>

</head>

<body>

<div class="form-container">

<h2>User Information Form</h2>

<form>

<label for="firstname">First Name</label>
<input type="text" id="firstname" name="firstname" placeholder="Enter first name" required>

<label for="lastname">Last Name</label>
<input type="text" id="lastname" name="lastname" placeholder="Enter last name" required>

<label for="dob">Date of Birth</label>
<input type="date" id="dob" name="dob" required>

<label>Gender</label>

<div class="gender">
<input type="radio" id="male" name="gender" value="Male" required>
<label for="male">Male</label>

<input type="radio" id="female" name="gender" value="Female">
<label for="female">Female</label>
</div>

<label for="opinion">Opinion about Ubuntu</label>
<textarea id="opinion" name="opinion" rows="4">
Ubuntu promotes community, humanity, and respect for others. It emphasizes that a person becomes a person through other people.
</textarea>

<div class="buttons">

<button type="submit" class="submit">Submit</button>

<button type="reset" class="clear">Clear</button>

<button type="button" class="cancel" onclick="window.location.reload();">Cancel</button>

</div>

</form>

</div>

</body>

</html>
