<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Information Form</title>

<style>

body{
font-family: Arial, sans-serif;
background:#eef2f7;
padding:40px;
}

.form-box{
width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#2c3e50;
}

.section{
margin-bottom:15px;
}

label{
display:block;
font-weight:bold;
margin-bottom:5px;
}

input{
width:100%;
padding:8px;
border:1px solid #ccc;
border-radius:5px;
}

.gender{
display:flex;
gap:15px;
margin-top:5px;
}

.opinion-box{
background:#f4f6f8;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
font-style:italic;
}

.buttons{
text-align:center;
margin-top:20px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.submit{
background:#2ecc71;
color:white;
}

.clear{
background:#e67e22;
color:white;
}

.cancel{
background:#e74c3c;
color:white;
}

</style>

</head>

<body>

<div class="form-box">

<h2>User Information Form</h2>

<form>

<div class="section">
<label>First Name</label>
<input type="text" name="firstname">
</div>

<div class="section">
<label>Last Name</label>
<input type="text" name="lastname">
</div>

<div class="section">
<label>Date of Birth</label>
<input type="date" name="dob">
</div>

<div class="section">
<label>Gender</label>
<div class="gender">
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
</div>
</div>

<div class="section">
<label for="opinion">Opinion about Ubuntu</label>
<textarea id="opinion" name="opinion" rows="4">
Ubuntu promotes community, humanity, and respect for others. It emphasizes that a person becomes a person through other people.
</textarea>

</div>

<div class="buttons">

<button type="submit" class="submit">Submit</button>

<button type="reset" class="clear">Clear</button>

<button type="button" class="cancel">Cancel</button>

</div>

</form>

</div>

</body>

</html>
